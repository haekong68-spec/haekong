<style>
  @font-face{ font-family:'Jaram'; src:url('display.woff') format('woff'); font-display:swap; }
  :root{
    --ink:#161e4e; --ink-soft:#24476B; --ink-mute:#3D6285; --muted:#6E93B5;
    --aqua:#3E9BD4; --aqua-deep:#1F6FA8; --aqua-soft:#7FC3E8;
    --line:rgba(255,255,255,.55); --line-2:rgba(255,255,255,.4);
    --bg:#DFF2FB; --bg-warm:#CBE9F8;
    --glass:rgba(226,244,255,.5); --card:rgba(240,250,255,.78);
    /* fx.js 호환용 별칭 */
    --main:#3E9BD4; --main-dark:#1F6FA8; --main-light:#CDEAF9; --char:none;
    --shadow-hover:0 14px 34px rgba(62,155,212,.28);
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; }
  body{ background:var(--bg); font-family:'Gowun Dodum',sans-serif; overflow-x:hidden; transition:background .25s; }

  /* 깜빡임 방지: 데이터 로딩 후 페이드인 */
  .wrap{ position:relative; width:100%; height:100svh; min-height:560px; overflow:hidden; background:var(--bg);
    opacity:0; transition:opacity .5s ease; }
  body.ready .wrap{ opacity:1; }

  /* 배경 = 일러스트 full-bleed */
  .scene__bg{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; object-position:50% 45%; }
  /* 상단 내비 가독용 아주 옅은 워시 */
  .scene__top{ position:absolute; left:0; right:0; top:0; height:120px; z-index:4; pointer-events:none;
    background:linear-gradient(180deg, rgba(210,240,255,.42), transparent); }

  /* 상단 내비 (타마즈 방식 그대로) */
  .topnav{ position:absolute; top:0; left:0; right:0; z-index:9; display:flex; align-items:center; justify-content:flex-start;
    gap:clamp(14px,1.6vw,26px); padding:18px clamp(18px,3vw,52px); }
  .brand{ display:flex; align-items:center; gap:11px; }
  .mark{ width:42px; height:42px; border-radius:12px; background:var(--aqua); border:1px solid rgba(255,255,255,.6);
    overflow:hidden; display:flex; align-items:center; justify-content:center; color:#fff; font-family:'Jaram','Jua'; font-size:21px; flex:0 0 auto; cursor:pointer; }
  .mark img{ width:100%; height:100%; object-fit:cover; }
  .bn{ font-family:'Jaram','Jua'; font-size:20px; color:var(--ink); letter-spacing:.08em; line-height:1.1;
    text-shadow:0 1px 10px rgba(230,248,255,.8); }
  .bs{ font-family:'Shippori Mincho'; font-size:9px; color:var(--ink-mute); letter-spacing:.3em; opacity:.85; }
  .nav-links{ margin-left:auto; display:flex; align-items:center; gap:clamp(16px,2vw,34px); }
  .nav-links a{ color:var(--ink-soft); text-decoration:none; font-size:clamp(16px,1.2vw,20px); font-weight:600; white-space:nowrap; transition:color .15s;
    text-shadow:0 1px 8px rgba(230,248,255,.75); }
  .nav-links a:hover{ color:var(--aqua-deep); }
  .nav-links a.on{ color:var(--aqua-deep); font-weight:800; }

  /* ── 가운데 소개 글 — 캐릭터와 해달 사이 (목업 위치) ── */
  .story{ position:absolute; left:64%; top:44%; transform:translate(-50%,-50%); z-index:8;
    width:max-content; max-width:50vw; }
  /* 박스 없이 글자 주변만 살짝 가라앉는 방사형 그라데이션 (테두리·판 없음) */
  .story::before{ content:''; position:absolute; inset:-14% -12%; z-index:-1; pointer-events:none;
    background:radial-gradient(ellipse at center, rgba(4,30,62,.42) 0%, rgba(4,30,62,.22) 48%, transparent 74%); }
  .story p{ margin:0; color:#F6FCFF; font-weight:600; font-size:clamp(22px,1.55vw,26px); line-height:1.9; letter-spacing:.015em;
    text-shadow:0 1px 2px rgba(0,30,60,.95), 0 2px 4px rgba(0,30,60,.9), 0 0 12px rgba(0,20,50,.75), 0 0 22px rgba(0,20,50,.6); }

  /* ── 하단 버튼 2개 — 우측 하단 (목업 배치) ── */
  .actions{ position:absolute; right:clamp(18px,3.4vw,56px); bottom:clamp(18px,3.4vw,44px); z-index:8;
    display:flex; align-items:center; gap:14px; }
  .btn{ border-radius:999px; font-weight:700; cursor:pointer; border:none; text-decoration:none;
    display:inline-flex; align-items:center; justify-content:center; font-family:inherit; white-space:nowrap;
    padding:13px 30px; font-size:16.5px; transition:transform .15s, box-shadow .15s; }
  .btn:hover{ transform:translateY(-2px); }
  .btn--p{ background:linear-gradient(150deg,var(--aqua),var(--aqua-deep)); color:#fff;
    box-shadow:0 10px 26px rgba(31,111,168,.4); }
  .btn--g{ background:rgba(255,255,255,.55); border:1.5px solid var(--line); color:var(--ink);
    backdrop-filter:blur(6px); }

  /* 문의 모달 (타마즈 방식 그대로) */
  .iq-ov{ position:fixed; inset:0; background:rgba(6,22,40,.5); display:none; align-items:center; justify-content:center; z-index:300; padding:16px; }
  .iq-ov.show{ display:flex; }
  .iq-m{ background:var(--bg); border:1px solid var(--line); border-radius:24px; width:100%; max-width:420px; padding:26px; box-shadow:0 20px 60px rgba(6,30,55,.4); }
  .iq-t{ font-family:'Jaram','Jua'; font-size:19px; color:var(--ink); margin-bottom:4px; }
  .iq-d{ font-size:13px; color:var(--ink-soft); margin-bottom:16px; }
  .iq-in{ width:100%; padding:12px 14px; border-radius:12px; border:1.5px solid var(--line); font-size:14px; outline:none; margin-bottom:10px; font-family:inherit; background:#fff; color:var(--ink); }
  .iq-in:focus{ border-color:var(--aqua); }
  .iq-bs{ display:flex; gap:8px; margin-top:6px; }
  .iq-bs button{ flex:1; padding:12px; border-radius:12px; border:none; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; }
  .iq-send{ background:var(--aqua); color:#fff; } .iq-cancel{ background:var(--main-light); color:var(--ink-soft); }

  /* fx.js 폴백 입자 (배포본 fx.js와 충돌 금지 — .fxfb 전용 클래스만) */
  #fx .fxfb{ position:fixed; bottom:-4vh; color:var(--main); opacity:0; pointer-events:none; z-index:2;
    animation:fxfbUp linear infinite; text-shadow:0 0 10px rgba(255,255,255,.5); }
  @keyframes fxfbUp{ 0%{ transform:translateY(0) translateX(0); opacity:0; }
    12%{ opacity:.75; } 88%{ opacity:.6; }
    100%{ transform:translateY(-108vh) translateX(3vw); opacity:0; } }

  /* 모바일: 배경은 소녀 쪽으로, 글박스·버튼 세로 스택 */
  @media (max-width:860px){
    .scene__bg{ object-position:36% 42%; }
    .topnav{ flex-wrap:wrap; }
    .nav-links{ order:3; width:100%; margin-left:0; overflow-x:auto; padding-bottom:2px; }
    .story{ left:50%; right:auto; top:auto; bottom:128px; transform:translateX(-50%); width:max-content; max-width:88vw; }
    .story p{ font-size:17px; line-height:1.85; }
    .actions{ left:6%; right:6%; justify-content:center; bottom:22px; }
    .btn{ flex:1; padding:12px 0; }
  }
  @media (prefers-reduced-motion:reduce){ .wrap{ transition:none; } #fx .fxfb{ display:none; } }
</style>
</head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase.js"></script>
<script>
  const defaults = {
    'soop-id': 'ueeeeeee81',   // ★ 해콩 SOOP 아이디로 교체 → 프사·홈페이지 버튼 자동 연동
    avatar: '',
    'hero-bg': '',
    'info-name': '해콩',
    'soop-url': 'https://www.sooplive.com/station/ueeeeeee81',
    'sns-url': '',
    birthday: '',
  };

  function soopAvatar(id){ if(!id) return null; id=id.trim().toLowerCase(); if(id.length<2||id.indexOf('{')>=0) return null;
    return 'https://profile.img.sooplive.co.kr/LOGO/'+id.slice(0,2)+'/'+id+'/'+id+'.jpg'; }

  async function load(){
    let saved = {};
    try{ const { data } = await db.from('profile').select('data').eq('id',1); if(data&&data[0]&&data[0].data) saved=data[0].data; }
    catch(e){ console.log('profile load', e); }
    const d = { ...defaults, ...saved };

    // 프사 = 고정 움짤(avatar.gif)

    var setTxt=function(id,v){ var el=document.getElementById(id); if(el&&v!=null&&v!=='') el.textContent=v; };
    setTxt('logoText', d['info-name']);

    // 홈페이지 버튼 = SOOP 방송국 (soop-url 우선, 없으면 아이디로 자동 생성)
    var soopUrl = d['soop-url'] || ((d['soop-id'] && d['soop-id'].indexOf('{')<0) ? 'https://ch.sooplive.co.kr/'+d['soop-id'].trim().toLowerCase() : '');
    var home=document.getElementById('link-soop'); if(home && soopUrl) home.href=soopUrl;

    // 배경 교체(관리자 hero-bg)
    var bi=document.getElementById('bgImg'); if(bi && d['hero-bg']){ bi.referrerPolicy='no-referrer'; bi.src=d['hero-bg']; }

    document.body.classList.add('ready');
  }

  load();
  setTimeout(function(){ document.body.classList.add('ready'); }, 1600);

  function openInquiry(){ document.getElementById('iq-ov').classList.add('show'); }
  function closeInquiry(){ document.getElementById('iq-ov').classList.remove('show'); }
  async function sendInquiry(){
    var nick=document.getElementById('iq-nick').value.trim(); if(!nick){ alert('닉네임을 적어주세요'); return; }
    var msg=document.getElementById('iq-msg').value.trim(); if(!msg){ alert('문의 내용을 적어주세요'); return; }
    if(typeof insertRow!=='function'){ alert('미리보기에선 전송이 꺼져 있어요 (배포본에서 동작)'); return; }
    var ok=await insertRow('inquiries',{ nickname:nick, message:msg });
    if(ok){ alert('문의가 전송됐어요! 🫧'); document.getElementById('iq-nick').value=''; document.getElementById('iq-msg').value=''; closeInquiry(); }
    else{ alert('전송 실패 ㅠㅠ 잠시 후 다시 시도해주세요'); }
  }

  if(window.parent!==window && typeof initIframeResize==='function'){ window.addEventListener('load', initIframeResize); setTimeout(initIframeResize, 800); }
</script>
<script src="fx.js"></script>
<script>
  /* fx.js 없을 때만 도는 인라인 폴백 — 물방울/거품 (배포본에선 자동 무시)
     ※ 레포의 fx.js 설정은 이렇게: FX_FLOAT=['🫧','💧','✧','○','🫧','✦'];  FX_CLICK='🫧'; */
  (function(){
    if (typeof window.fxHearts === 'function') return;
    var host=document.createElement('div'); host.id='fx';
    host.style.cssText='position:fixed;inset:0;pointer-events:none;z-index:2;overflow:hidden';
    document.body.appendChild(host);
    var shapes=['🫧','💧','✧','○','🫧','✦'];
    for(var i=0;i<14;i++){
      var s=document.createElement('span'); s.className='fxfb';
      s.textContent=shapes[i%shapes.length];
      s.style.left=(Math.random()*100)+'vw';
      s.style.fontSize=(11+Math.random()*15)+'px';
      s.style.animationDuration=(9+Math.random()*10)+'s';
      s.style.animationDelay=(-Math.random()*12)+'s';
      host.appendChild(s);
    }
    document.addEventListener('click', function(e){
      if(e.target.closest('button,a,input,textarea,.iq-ov')) return;
      for(var i=0;i<6;i++){
        var p=document.createElement('span');
        p.textContent='🫧';
        p.style.cssText='position:fixed;left:'+e.clientX+'px;top:'+e.clientY+'px;pointer-events:none;z-index:250;font-size:'+(12+Math.random()*10)+'px;transition:transform .7s ease-out,opacity .7s';
        document.body.appendChild(p);
        (function(p){ requestAnimationFrame(function(){
          p.style.transform='translate('+((Math.random()-0.5)*110)+'px,'+(-40-Math.random()*70)+'px) scale('+(0.6+Math.random())+')';
          p.style.opacity='0';
        }); setTimeout(function(){ p.remove(); },750); })(p);
      }
    });
    // 프사 바운스 폴백
    var av=document.getElementById('avatarWrap');
    if(av) av.addEventListener('click', function(){
      av.animate([{transform:'scale(1)'},{transform:'scale(.88)'},{transform:'scale(1.06)'},{transform:'scale(1)'}],{duration:420,easing:'ease-out'});
    });
  })();
</script>
